services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tender_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tender_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tender_platform
      JWT_SECRET: dev-secret-change-in-production-8f7g6h5j4k3l2m1n
      JWT_EXPIRES_IN: 7d
      # Browser origin for CORS — must match where frontend is exposed on host
      CORS_ORIGIN: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
      # Gmail SMTP — use an App Password, NOT your Gmail login password
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: mintesinottefera26@gmail.com
      SMTP_PASS: "glec gptz vazq yfhb"

    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Baked at build time — browser calls backend directly on host port
        VITE_API_URL: http://localhost:5000/api
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
